name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'Chat/Server/**'
      - 'Chat/UI/**'

jobs:
  deploy-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if Server files changed
        id: server-check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -q "Chat/Server"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.server-check.outputs.changed == 'true'
        run: npm install -g vercel

      - name: Deploy Server to Vercel Production
        if: steps.server-check.outputs.changed == 'true'
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: Chat/Server
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SERVER_PROJECT_ID }}

  deploy-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if UI files changed
        id: ui-check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -q "Chat/UI"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.ui-check.outputs.changed == 'true'
        run: npm install -g vercel

      - name: Deploy UI to Vercel Production
        if: steps.ui-check.outputs.changed == 'true'
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: Chat/UI/portfolio
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_UI_PROJECT_ID }}